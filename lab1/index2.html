<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodaj Grę - Mityczny Pionek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1><a href="index.html">Mityczny Pionek 🎲</a></h1>
        <div class="nav-buttons">
            <button class="btn">Zaloguj / Zarejestruj</button>
            <button class="btn">🛒 Koszyk (0)</button>
            <a href="index.html" class="btn btn-secondary">Wróć do sklepu</a>
        </div>
    </header>

    <div class="form-container">
        <h2>Dodaj nową pozycję do bazy</h2>
        
        <form action="#" method="get">
            <div class="filter-group">
                <label>Nazwa gry planszowej</label>
                <input type="text" required placeholder="Wpisz tytuł gry">
            </div>

            <div class="filter-group">
                <label>Cena (zł)</label>
                <input type="number" step="0.01" required placeholder="0.00">
            </div>

            <div class="filter-group">
                <label>Rodzaj gry</label>
                <select required>
                    <option value="">Wybierz kategorię...</option>
                    <option value="strategia">Strategiczna</option>
                    <option value="impreza">Imprezowa</option>
                    <option value="karciana">Karciana</option>
                    <option value="rpg">RPG</option>
                    <option value="rodzinna">Rodzinna</option>
                </select>
            </div>

            <div class="filter-group" style="display: flex; flex-direction: row; gap: 20px;">
                <div style="flex: 1;">
                    <label>Ilość graczy (max)</label>
                    <input type="number" min="1" required style="width: 100%;">
                </div>
                <div style="flex: 1;">
                    <label>Czas gry (min)</label>
                    <input type="number" min="1" required style="width: 100%;">
                </div>
            </div>

            <div class="filter-group">
                <label>Wydawnictwo</label>
                <input type="text" required placeholder="Kto wydał grę?">
            </div>

            <div class="filter-group">
                <label>Szczegółowy opis (słowa w opisie będą filtrowane)</label>
                <textarea required placeholder="Opisz zasady, klimat i zawartość pudełka..."></textarea>
            </div>

            <button type="submit" class="btn" style="width: 100%; font-size: 16px; padding: 12px;">Zapisz i dodaj grę</button>
        </form>
    </div>

</body>
</html>
